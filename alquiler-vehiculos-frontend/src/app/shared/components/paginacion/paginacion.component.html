@if (totalPages > 1) {
    <div class="d-flex justify-content-between align-items-center mt-3">
      <small class="text-muted">
        Mostrando {{ itemsEnPagina }} de {{ totalElements }} {{ labelItems }}
      </small>
      <nav>
        <ul class="pagination pagination-sm mb-0">
  
          <li class="page-item" [class.disabled]="paginaActual === 0">
            <a class="page-link" (click)="irPagina(paginaActual - 1)">
              <i class="bi bi-chevron-left"></i>
            </a>
          </li>
  
          @for (pagina of paginas; track pagina) {
            <li class="page-item" [class.active]="pagina === paginaActual">
              <a class="page-link" (click)="irPagina(pagina)">
                {{ pagina + 1 }}
              </a>
            </li>
          }
  
          <li class="page-item" [class.disabled]="esUltimaPagina">
            <a class="page-link" (click)="irPagina(paginaActual + 1)">
              <i class="bi bi-chevron-right"></i>
            </a>
          </li>
  
        </ul>
      </nav>
    </div>
  }
