<div class="login">
    <div class="login__container">
      <div class="row g-0">
  
        <!-- formulario -->
        <div class="col-12 col-sm-6 order-1 order-sm-0">
          <div class="login__form-container">
            <form (ngSubmit)="ingresar()">
  
              <div class="login__brand">
                <i class="bi bi-car-front-fill"></i>
              </div>
              <h2 class="login__title">Bienvenido</h2>
              <p class="login__subtitle">Sistema de Alquiler de Vehículos</p>
  
              <!-- Campo usuario -->
              <div class="mb-3">
                <div class="login__group_input">
                  <input
                    type="text"
                    [(ngModel)]="username"
                    name="username"
                    class="form-control"
                    placeholder="Usuario"
                    autocomplete="off">
                  <i class="bi bi-person"></i>
                </div>
              </div>
  
              
              <div class="mb-3">
                <div class="login__group_input">
                  <input
                    type="password"
                    [(ngModel)]="password"
                    name="password"
                    class="form-control"
                    placeholder="Contraseña">
                  <i class="bi bi-lock"></i>
                </div>
              </div>
  
              <!-- Botón -->
              <div class="d-grid">
                <button
                  type="submit"
                  class="btn btn-primary"
                  [disabled]="cargando">
                
                  @if (cargando) {
                    <span class="spinner-border spinner-border-sm me-2"></span>
                    Ingresando...
                  } @else {
                    <i class="bi bi-box-arrow-in-right me-2"></i>
                    Ingresar
                  }
                </button>
              </div>
  
            </form>
          </div>
        </div>
  
        <!-- Columna derecha: imagen decorativa -->
        <div class="col-12 col-sm-6 order-0 order-sm-1">
          <div class="login__image">
            <div class="login__image-placeholder">
              <i class="bi bi-car-front-fill"></i>
              <h3>Alquiler de Vehículos</h3>
              <p>Gestiona tu flota de manera eficiente</p>
            </div>
          </div>
        </div>
  
      </div>
    </div>
  </div>
